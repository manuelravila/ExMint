<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <title>ExMint Add-In</title>
  <link rel="stylesheet" href="taskpane.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Exmint</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <!-- AvenirNext LT Pro Regular font -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container h-100" style="margin-top: 50px;">
    <div class="row align-items-center justify-content-center h-100">
      <div class="col-lg-6 text-center">
        <img src="/assets/logo.png" alt="Logo" class="img-fluid mb-4">
        <div class="login-container mt-4">
          <form action="/login" method="post" class="border p-4 rounded">
            <div class="form-group">
              <label for="login" class="form-control-label">Username / Email</label>
              <input type="text" id="login" name="login" class="form-control" placeholder="Username / Email">
            </div>
            <div class="form-group">
              <label for="password" class="form-control-label">Password</label>
              <input type="password" id="password" name="password" class="form-control" placeholder="Password">
            </div>
            <button type="submit" class="btn btn-primary">Log In</button>
          </form>
        </div>
        <div class="login-links mt-3">
            <a id="resetPasswordLink" href="#">I forgot my password 🤦‍♂️</a><br>
            <a id="createAccountLink" href="#">New to Exmint? Create an account 🙌</a>
        </div>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.0/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
