name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: ExMint Version
      description: Found in the dashboard footer or `version.py`
      placeholder: "e.g. 1.1.5"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps to reliably reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: deploy
    attributes:
      label: Deployment method
      options:
        - Docker (docker-compose)
        - Local Python (flask run)
        - Other
    validations:
      required: true

  - type: dropdown
    id: db
    attributes:
      label: Database
      options:
        - MySQL / MariaDB
        - SQLite
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste any Flask logs, browser console errors, or stack traces here.
      render: text
