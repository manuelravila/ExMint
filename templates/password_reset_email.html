<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Request</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .email-container {
            width: 100%;
            max-width: 600px;
            margin: auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            padding: 10px 0;
        }
        .header .logo-text {
            font-size: 24px;
            font-weight: bold;
        }
        .header .logo-text .ex {
            color: #1C9165;
        }
        .header .logo-text .mint {
            color: #36BBFF;
        }
        .content {
            padding: 20px;
            text-align: center;
        }
        .content h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .content p {
            font-size: 16px;
            line-height: 1.5;
            color: #333333;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            color: #ffffff;
            background-color: #007BFF;
            text-decoration: none;
            border-radius: 5px;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #666666;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            <span class="logo-text"><span class="ex">Ex</span><span class="mint">Mint</span></span>
        </div>
        <div class="content">
            <h1>Password Reset Request</h1>
            <p>Hello,</p>
            <p>You have requested to reset your password. Click the button below to reset it:</p>
            <a href="{{ reset_url }}" class="button">Reset Password</a>
            <p>If you did not request a password reset, please ignore this email or contact support.</p>
        </div>
        <div class="footer">
            <p>&copy; 2024 ExMint. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
