{% extends 'base.html' %}

{% block content %}
    <div class="container h-100" style="margin-top: 50px;">
        <div class="row align-items-center justify-content-center h-100">
            <div class="col-lg-6 text-center">
                <img src="{{ url_for('static', filename='images/logosmall.png') }}" alt="Logo" class="img-fluid mb-4">
                <div class="container h-100" style="margin-top: 50px;">
                    <div class="row align-items-center justify-content-center h-100">
                        <form method="POST">
                            <input type="hidden" name="token" value="{{ token }}">
                            <div class="form-group">
                                <p>Please enter a secure password with at least 8 characters, including a mix of uppercase letters, lowercase letters, numbers, and special characters.</p>
                                <label for="new_password">New Password:</label>
                                <input type="password" id="new_password" name="new_password" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="confirm_password">Confirm New Password:</label>
                                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Reset Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
