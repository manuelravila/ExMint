<!-- index.html -->
{% extends 'base.html' %}

{% block content %}

    <div class="container h-100" style="margin-top: 50px;">
        <div class="row align-items-center justify-content-center h-100">
            <div class="col-lg-6 text-center">
                <img src="{{ url_for('static', filename='images/logomed.png') }}" alt="Logo" class="img-fluid mb-4">
                <div class="login-container mt-4">
                    <form action="{{ url_for('views.login') }}" method="post" class="border p-4 rounded">
                        {{ form.hidden_tag() }}
                        <div class="form-group">
                            <label for="login" class="form-control-label">Email</label>
                            <input
                                type="email"
                                id="login"
                                name="login"
                                class="form-control"
                                placeholder="Email"
                                required
                                value="{{ request.form.get('login', '') }}"
                                autocomplete="username"
                            >
                        </div>
                        <div class="form-group">
                            <label for="password" class="form-control-label">Password</label>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-control"
                                placeholder="Password"
                                required
                                autocomplete="current-password"
                            >
                        </div>
                        <button type="submit" class="btn btn-primary">Log In</button>
                    </form>
                    <div class="login-links mt-3">
                        <a href="{{ url_for('views.reset_password') }}">I forgot my password 🤦‍♂️</a><br>
                        <a href="{{ url_for('views.register') }}">New to Exmint? Create an account 🙌</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
