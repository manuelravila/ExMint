version: '3.8'
services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env.${FLASK_ENV:-dev}
    environment:
      - FLASK_ENV=${FLASK_ENV:-dev}
    volumes:
      - .:/app
    depends_on:
      - node-addin
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "db-host:172.20.0.1"
    networks:
      app-network:
        ipv4_address: 172.20.0.3

  node-addin:
    build: ./excel_addin
    ports:
      - "3000:3000"
    volumes:
      - ./excel_addin:/app
    networks:
      app-network:
        ipv4_address: 172.20.0.4

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: vps-app-network-${FLASK_ENV:-dev}