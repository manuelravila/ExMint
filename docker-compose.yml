version: '3.8'
services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env.${FLASK_ENV:-dev}
    environment:
      - FLASK_ENV=${FLASK_ENV:-dev}
    volumes:
      - .:/app
    depends_on:
      - node-addin  # Centralized dependency management

  node-addin:
    build: ./excel_addin
    ports:
      - "3000:3000"
    volumes:
      - ./excel_addin:/app

# Define networks here without the "external: true" option
networks:
  staging-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1

  production-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/16
          gateway: 172.31.0.1